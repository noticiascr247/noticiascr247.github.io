<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | CR Noticias 24/7</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3859560490589198" crossorigin="anonymous"></script>
    <style>
        .contact-form { max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; }
        .submit-btn { background: var(--primary-red); color: white; border: none; padding: 15px 30px; border-radius: 4px; font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <div class="container header-top">
            <a href="index.html" class="logo">CR <span>Noticias 24/7</span></a>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="contacto.html" class="nav-link active">Contacto</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="page-content">
            <h1 style="text-align: center;">Contáctenos</h1>
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" placeholder="Su nombre...">
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="su@email.com">
                </div>
                <div class="form-group">
                    <label for="message">Mensaje</label>
                    <textarea id="message" rows="6" placeholder="Escriba su mensaje aquí..."></textarea>
                </div>
                <button type="submit" class="submit-btn" onclick="event.preventDefault(); alert('Gracias por contactarnos. Responderemos pronto.');">Enviar Mensaje</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-grid">
                <div>
                    <div class="footer-logo">CR <span>Noticias 24/7</span></div>
                    <p class="footer-text">Información veraz y al minuto desde Costa Rica para el mundo.</p>
                </div>
            </div>
            <div class="footer-bottom">
                &copy; 2024 CR Noticias 24/7. Todos los derechos reservados.
            </div>
        </div>
    </footer>

</body>
</html>
